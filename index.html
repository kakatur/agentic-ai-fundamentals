  <script>
    (() => {
      let theme = localStorage.getItem('agentic-ai-theme');
      if (!theme) {
        theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches)
          ? 'light'
          : 'dark';
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
